<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>לשון Lesson — פלטפורמה דיגיטלית ללימודי עברית</title>
  <link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* תיקון למסך הלוגין - מאפשר גלילה בטלפונים */
    #login-screen {
      position: relative; 
      min-height: 100vh;
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: flex-start; /* מתחיל מלמעלה כדי שיהיה מקום לגלול */
      padding: 2rem 1rem; 
      background: linear-gradient(160deg, #060b18 0%, #0d1b38 50%, #07111f 100%);
      overflow-y: auto; /* מאפשר גלילה אנכית */
    }

    .ls-header { margin-bottom: 2rem; margin-top: 1rem; text-align: center; }
    
    .ls-cards { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 0.8rem; }

    /* עיצוב כפתורי הבחירה */
    .lc { 
      border-radius: 16px; 
      padding: 1.2rem; 
      cursor: pointer; 
      border: 1px solid rgba(255,255,255,0.1); 
      background: rgba(255,255,255,0.05);
      display: flex; 
      align-items: center; 
      gap: 12px; 
      color: white;
      width: 100%;
    }

    /* תיקון פאנל המורה - שיהיה קומפקטי יותר */
    .teacher-settings { 
      width: 100%; 
      background: rgba(255, 255, 255, 0.08); 
      border: 1px solid rgba(255, 255, 255, 0.15); 
      border-radius: 20px; 
      padding: 1.5rem; 
      display: none; 
      margin-top: 0.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .teacher-settings.open { display: block; }

    .settings-input { 
      width: 100%; 
      padding: 0.7rem; 
      margin-top: 0.3rem;
      border-radius: 10px; 
      background: white; 
      border: none; 
      color: #333; 
      font-size: 1rem; 
    }

    .settings-label { font-size: 0.8rem; color: #aaa; font-weight: bold; display: block; margin-top: 0.8rem; }

    .settings-row { display: flex; gap: 10px; margin-top: 1.5rem; }
    
    .settings-btn { 
      flex: 1; 
      padding: 0.8rem; 
      border: none; 
      border-radius: 12px; 
      font-weight: bold; 
      cursor: pointer; 
      font-size: 1rem;
    }
    .settings-btn-save { background: #2ecc71; color: white; }
    .settings-btn-cancel { background: rgba(255,255,255,0.1); color: white; }

    /* רשת השיעורים */
    .lessons-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
      gap: 12px; 
      margin-top: 1.5rem; 
    }
    .lesson-card { 
      background: white; 
      padding: 1.2rem; 
      border-radius: 15px; 
      text-align: center; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
    }
  </style>
</head>
<body>

<section id="login-screen">
  <div class="ls-header">
    <h1 style="font-family:'Secular One'; color:white; font-size:2.2rem; margin:0;"><em>לשון</em> Lesson</h1>
    <p style="color:rgba(255,255,255,0.5);">פלטפורמה דיגיטלית ללימודי עברית</p>
  </div>
  
  <div class="ls-cards">
    <div class="lc" onclick="goToLessons()" style="background: rgba(77, 138, 255, 0.15);">
      <span style="font-size:1.5rem;">👨‍🎓</span>
      <div style="text-align:right;">
        <div style="font-weight:bold;">תלמיד/ה</div>
        <div style="font-size:0.75rem; opacity:0.6;">כניסה לשיעורים ותרגול</div>
      </div>
    </div>
    
    <div class="lc" onclick="toggleTeacherSettings()" style="background: rgba(202, 138, 4, 0.15);">
      <span style="font-size:1.5rem;">👩‍🏫</span>
      <div style="text-align:right;">
        <div style="font-weight:bold;">מורה</div>
        <div style="font-size:0.75rem; opacity:0.6;">הגדרת פרטים לקבלת תוצרים</div>
      </div>
    </div>
    
    <div class="teacher-settings" id="teacher-panel">
      <label class="settings-label">שם המורה</label>
      <input type="text" id="teacher-name" class="settings-input" placeholder="למשל: ליאור">
      
      <label class="settings-label">דוא״ל</label>
      <input type="email" id="teacher-email" class="settings-input" placeholder="example@gmail.com">
      
      <label class="settings-label">וואטסאפ</label>
      <input type="text" id="teacher-whatsapp" class="settings-input" placeholder="050-0000000">
      
      <div class="settings-row">
        <button class="settings-btn settings-btn-save" onclick="saveTeacherSettings()">שמור וכנס</button>
        <button class="settings-btn settings-btn-cancel" onclick="toggleTeacherSettings()">ביטול</button>
      </div>
    </div>
  </div>
</section>

<section id="lessons-view" style="display: none; padding: 1.5rem;">
  <button onclick="backToLogin()" style="background:#eee; border:none; padding:8px 15px; border-radius:10px; margin-bottom:1rem;">← חזרה</button>
  <h2 style="font-family:'Secular One';">🎓 רשימת שיעורים</h2>
  <div class="lessons-grid">
    <div class="lesson-card" onclick="openLesson('lesson1_refactored.html')">📖<br><b>שיעור 1</b><br><small>השורש</small></div>
    <div class="lesson-card" onclick="openLesson('lesson2_refactored.html')">✏️<br><b>שיעור 2</b><br><small>בניין קל</small></div>
    <div class="lesson-card" onclick="openLesson('lesson3_binyanim_kvedim_v3.html')">🎯<br><b>שיעור 3</b><br><small>כבדים</small></div>
  </div>
</section>

<script src="shared-logic.js"></script>
<script>
  function toggleTeacherSettings() {
    const panel = document.getElementById('teacher-panel');
    panel.classList.toggle('open');
    if(panel.classList.contains('open')) {
       panel.scrollIntoView({ behavior: 'smooth' }); // גולל אוטומטית לכפתור השמירה
    }
  }

  function saveTeacherSettings() {
    const name = document.getElementById('teacher-name').value.trim();
    if (!name) { alert('אנא הקלידו שם'); return; }

    if (typeof saveTeacherDetails === 'function') {
      saveTeacherDetails(name, document.getElementById('teacher-email').value, document.getElementById('teacher-whatsapp').value)
      .then(() => enterPlatform());
    } else {
      enterPlatform();
    }
  }

  function goToLessons() { enterPlatform(); }

  function enterPlatform() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('lessons-view').style.display = 'block';
    window.scrollTo(0, 0);
  }

  function backToLogin() {
    document.getElementById('lessons-view').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function openLesson(file) { window.location.href = file; }
</script>
</body>
</html>
